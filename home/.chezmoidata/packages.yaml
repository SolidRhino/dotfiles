      - itermai
      - neovide-app
      - ollama-app
      - setapp
      - tailscale-app
      - telegram
      - tor-browser
      - visual-studio-code
      - whatsapp

    mas:
      # Format: - <app_id>    # App Name
      - 497799835   # Xcode
      - 361309726   # Pages
      - 409201541   # Numbers
      - 1496833156  # Swift Playgrounds

    setapp:
      - AlDente Pro
      - CleanMyMac
      - Elmedia Player
      - Luminar Neo
      - Moonlock
      - Numi
      - Shortcutie

  apt:
    - build-essential
    - fd-find           # 'fd' on other package managers
    - 1password-cli     # op CLI (repo added by install-op script)

  dnf:
    - "@development-tools"
    - 1password-cli     # op CLI (repo added by install-op script)

  pacman:
    - base-devel
    - github-cli        # 'gh' on other package managers
    - tree-sitter       # 'tree-sitter-cli' on other package managers
    - 1password-cli     # op CLI (in official extra repo)
