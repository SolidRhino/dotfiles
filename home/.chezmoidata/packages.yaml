packages:
  cargo:
    - atuin
    - bat
    - cargo-update
    - difftastic
    - eza
    - git-cliff
    - mise
    - ripgrep
    - starship
    - topgrade

  common:
    - curl
    - fd
    - fish
    - fzf
    - gh
    - git
    - git-lfs
    - lazygit
    - neovim
    - shellcheck
    - tree-sitter-cli
    - wget
    - zoxide

  darwin:
    brews:
      - mackup
      - mas
    casks:
      - 1password
      - 1password-cli
      - brave-browser
      - claude
      - codex
      - font-fira-code-nerd-font
      - font-jetbrains-mono-nerd-font
