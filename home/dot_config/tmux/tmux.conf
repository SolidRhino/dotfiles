# Main tmux config
# Keep this file as the stable entrypoint and source feature-specific config files
# from conf.d/ in a predictable order.

source-file ~/.config/tmux/conf.d/00-general.conf
source-file ~/.config/tmux/conf.d/10-terminal.conf
source-file ~/.config/tmux/conf.d/20-status.conf
source-file ~/.config/tmux/conf.d/30-plugins.conf
source-file ~/.config/tmux/conf.d/40-bindings.conf
