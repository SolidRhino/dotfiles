# ==========================================
# Prefix and interaction
# ==========================================

# Use Ctrl+a as the tmux prefix instead of the default Ctrl+b.
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable mouse support for pane selection, scrolling, and resizing.
set -g mouse on

# Use Vim-style keys in copy mode.
setw -g mode-keys vi

# ==========================================
# Responsiveness and history
# ==========================================

set -g focus-events on
set -g escape-time 0
set -g history-limit 100000
set -g set-clipboard on

# ==========================================
# Window and pane behavior
# ==========================================

# Start numbering at 1 and renumber windows automatically.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
