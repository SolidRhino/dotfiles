# ==========================================
# Status line helpers
# ==========================================

set -g status-position bottom
set -g status-interval 10

# Show a compact git branch for the active pane path when available.
set -g @tmux_git_branch '#(git -C "#{pane_current_path}" symbolic-ref --short HEAD 2>/dev/null || git -C "#{pane_current_path}" rev-parse --short HEAD 2>/dev/null)'

# Theme base
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_right_separator " "

# Status content
set -g status-left-length 40
set -g status-right-length 140
set -g status-left '#[fg=#89b4fa,bg=default] #S '
set -g status-right '#[fg=#a6e3a1,bg=default]#{@tmux_git_branch} #[fg=#f9e2af,bg=default]#H #[fg=#89dceb,bg=default]#{battery_percentage} #[fg=#cba6f7,bg=default]%Y-%m-%d %H:%M '
