# ==========================================
# Splits and reload
# ==========================================

# Keep new splits in the current pane's working directory.
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Reload tmux config quickly.
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# ==========================================
# Navigation and resizing
# ==========================================

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ==========================================
# Popup helpers
# ==========================================

bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
bind f display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "tmux-fzf"
bind s display-popup -E -w 80% -h 80% "tmux choose-tree -Zs"
bind e display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "${EDITOR:-nvim} ~/.config/tmux/tmux.conf"
