name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck on plain shell scripts
        run: |
          shellcheck \
            .install-op-and-age.sh \
            home/.chezmoiscripts/run_before_00-write-age-identity.sh \
            home/.chezmoiscripts/run_once_after_25-setup-op-gh-plugin.sh \
            home/dot_local/bin/executable_oscar-update
      - name: Verify bootstrap helper is CI-safe
        run: CI=1 bash .install-op-and-age.sh

  generated-shellcheck:
    name: generated shellcheck (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    # Keep this matrix in sync with chezmoi-verify below.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-ubuntu-headless
            runner: ubuntu-latest
            os_family: linux
            osid: linux-ubuntu
            personal: false
            headless: true
            ephemeral: false
          - name: linux-arch-personal
            runner: ubuntu-latest
            os_family: linux
            osid: linux-arch
            personal: true
            headless: false
            ephemeral: false
          - name: linux-fedora-headless
            runner: ubuntu-latest
            os_family: linux
            osid: linux-fedora
            personal: false
            headless: true
            ephemeral: false
          - name: darwin-personal
            runner: macos-latest
            os_family: darwin
            osid: darwin
            personal: true
            headless: false
            ephemeral: false
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck
      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Create minimal chezmoi config for CI
        run: |
          mkdir -p ~/.config/chezmoi
          cat > ~/.config/chezmoi/chezmoi.toml << 'EOF'
          [data]
            osid      = "${{ matrix.osid }}"
            personal  = ${{ matrix.personal }}
            headless  = ${{ matrix.headless }}
            ephemeral = ${{ matrix.ephemeral }}
          EOF
      - name: Render and shellcheck templated scripts
        shell: bash
        run: |
          set -euo pipefail

          render_dir="$RUNNER_TEMP/generated-shellcheck"
          mkdir -p "$render_dir"

          # Keep this template allowlist in sync with chezmoi-verify below.
          templates=(
            home/.chezmoiscripts/run_once_after_10-install-rust.sh.tmpl
            home/.chezmoiscripts/run_once_after_19-install-mise.sh.tmpl
            home/.chezmoiscripts/run_onchange_after_20-install-cargo-packages.sh.tmpl
            home/.chezmoiscripts/run_onchange_after_21-install-mise-tools.sh.tmpl
            home/.chezmoiscripts/run_onchange_after_30-set-default-shell.sh.tmpl
            home/.chezmoiscripts/run_onchange_after_40-fish-update-completions.sh.tmpl
            home/.chezmoiscripts/run_after_50-extract-archive.sh.tmpl
          )

          if [ "${{ matrix.os_family }}" = "linux" ]; then
            templates+=(
              home/.chezmoiscripts/linux/run_onchange_before_10-setup-package-repos.sh.tmpl
              home/.chezmoiscripts/linux/run_onchange_before_15-install-aur-helper.sh.tmpl
              home/.chezmoiscripts/linux/run_onchange_before_20-install-packages.sh.tmpl
            )
          elif [ "${{ matrix.os_family }}" = "darwin" ]; then
            templates+=(
              home/.chezmoiscripts/darwin/run_onchange_before_10-install-packages.sh.tmpl
              home/.chezmoiscripts/darwin/run_once_after_26-install-setapp-cli.sh.tmpl
              home/.chezmoiscripts/darwin/run_onchange_after_27-install-setapp-apps.sh.tmpl
              home/.chezmoiscripts/darwin/run_after_28-install-oscar.sh.tmpl
              home/.chezmoiscripts/darwin/run_once_after_29-setup-touchid-sudo.sh.tmpl
              home/.chezmoiscripts/darwin/run_once_after_install-claude-code.sh.tmpl
              home/.chezmoiscripts/darwin/run_once_after_mackup-restore.sh.tmpl
            )
          fi

          for template in "${templates[@]}"; do
            output="$render_dir/$(basename "${template%.tmpl}")"
            chezmoi --source="$GITHUB_WORKSPACE/home" execute-template -f "$template" > "$output"

            if [ ! -s "$output" ]; then
              echo "Skipping empty render: $template"
              rm -f "$output"
              continue
            fi

            shellcheck "$output"
          done

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint YAML files
        run: |
          yamllint .github/workflows/
          yamllint home/.chezmoidata/packages.yaml

  toml:
    name: toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check TOML syntax
        run: |
          python3 -c "import tomllib; tomllib.load(open('cliff.toml', 'rb')); print('cliff.toml OK')"
          python3 -c "import tomllib; tomllib.load(open('home/dot_config/starship.toml', 'rb')); print('starship.toml OK')"
          python3 -c "import tomllib; tomllib.load(open('home/dot_config/atuin/config.toml', 'rb')); print('atuin/config.toml OK')"

  chezmoi-verify:
    name: chezmoi verify (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    # Keep this matrix in sync with generated-shellcheck above.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-ubuntu-headless
            runner: ubuntu-latest
            osid: linux-ubuntu
            personal: false
            headless: true
            ephemeral: false
          - name: linux-arch-personal
            runner: ubuntu-latest
            osid: linux-arch
            personal: true
            headless: false
            ephemeral: false
          - name: linux-fedora-headless
            runner: ubuntu-latest
            osid: linux-fedora
            personal: false
            headless: true
            ephemeral: false
          - name: darwin-personal
            runner: macos-latest
            osid: darwin
            personal: true
            headless: false
            ephemeral: false
    steps:
      - uses: actions/checkout@v6
      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Create minimal chezmoi config for CI
        run: |
          mkdir -p ~/.config/chezmoi
          cat > ~/.config/chezmoi/chezmoi.toml << 'EOF'
          [data]
            osid      = "${{ matrix.osid }}"
            personal  = ${{ matrix.personal }}
            headless  = ${{ matrix.headless }}
            ephemeral = ${{ matrix.ephemeral }}
          EOF
      - name: Verify chezmoi source renders
        shell: bash
        run: |
          set -euo pipefail

          # Keep this template allowlist in sync with generated-shellcheck above.
          templates=(
            home/dot_gitconfig.tmpl
            home/dot_config/mise/config.toml.tmpl
            home/.chezmoiscripts/run_once_after_10-install-rust.sh.tmpl
            home/.chezmoiscripts/run_once_after_19-install-mise.sh.tmpl
            home/.chezmoiscripts/run_onchange_after_20-install-cargo-packages.sh.tmpl
            home/.chezmoiscripts/run_onchange_after_21-install-mise-tools.sh.tmpl
            home/.chezmoiscripts/run_onchange_after_30-set-default-shell.sh.tmpl
            home/.chezmoiscripts/run_onchange_after_40-fish-update-completions.sh.tmpl
            home/.chezmoiscripts/run_after_50-extract-archive.sh.tmpl
          )

          if [ "${{ matrix.osid }}" = "darwin" ]; then
            templates+=(
              home/.chezmoiscripts/darwin/run_onchange_before_10-install-packages.sh.tmpl
              home/.chezmoiscripts/darwin/run_once_after_26-install-setapp-cli.sh.tmpl
              home/.chezmoiscripts/darwin/run_onchange_after_27-install-setapp-apps.sh.tmpl
              home/.chezmoiscripts/darwin/run_after_28-install-oscar.sh.tmpl
              home/.chezmoiscripts/darwin/run_once_after_29-setup-touchid-sudo.sh.tmpl
              home/.chezmoiscripts/darwin/run_once_after_install-claude-code.sh.tmpl
              home/.chezmoiscripts/darwin/run_once_after_mackup-restore.sh.tmpl
            )
          else
            templates+=(
              home/.chezmoiscripts/linux/run_onchange_before_10-setup-package-repos.sh.tmpl
              home/.chezmoiscripts/linux/run_onchange_before_15-install-aur-helper.sh.tmpl
              home/.chezmoiscripts/linux/run_onchange_before_20-install-packages.sh.tmpl
            )
          fi

          for template in "${templates[@]}"; do
            chezmoi --source="$GITHUB_WORKSPACE/home" execute-template -f "$template" > /dev/null
          done
