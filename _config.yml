title: dotfiles
description: Personal dotfiles for macOS & Linux
baseurl: "/dotfiles"
url: "https://solidrhino.github.io"

theme: just-the-docs
color_scheme: catppuccin-mocha

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  focus_shortcut_key: 'k'

enable_copy_code_button: true

aux_links:
  "GitHub":
    - "https://github.com/SolidRhino/dotfiles"
aux_links_new_tab: true

last_edit_timestamp: true
last_edit_time_format: "%b %e %Y"
gh_edit_link: true
gh_edit_link_text: "Edit on GitHub"
gh_edit_repository: "https://github.com/SolidRhino/dotfiles"
gh_edit_branch: "main"
gh_edit_content_url: ""

callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: red
  important:
    title: Important
    color: purple

plugins:
  - jekyll-last-modified-at

exclude:
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - vendor
  - home/         # chezmoi source root — not part of the site
  - docs/superpowers  # local-only brainstorm/plan files (gitignored)
  - .serena        # Serena project memory files — not part of the site
  - CLAUDE.md
  - cliff.toml
  - .editorconfig
  - .yamllint.yaml
